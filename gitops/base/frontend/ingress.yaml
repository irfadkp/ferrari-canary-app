apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ferrari-ingress
  labels:
    app: ferrari
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  ingressClassName: traefik
  rules:
  - host: ferrari-shop.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: ferrari-frontend
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: ferrari-backend-stable
            port:
              number: 8080